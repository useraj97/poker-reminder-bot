name: PokerBros table reminders

on:
  # Times are UTC. Each reminder is scheduled ~7 min early for BOTH possible
  # Eastern offsets (EDT = UTC-4, EST = UTC-5); send_reminder.py sleeps to the
  # exact ET time and ignores the schedule that matches the other offset, so
  # each reminder fires exactly once at the right local time year-round.
  schedule:
    # First reminder -> 7:58 PM ET
    - cron: "51 23 * * *"   # 19:51 EDT
    - cron: "51 0 * * *"    # 19:51 EST
    # Second reminder -> 8:05 PM ET
    - cron: "58 23 * * *"   # 19:58 EDT
    - cron: "58 0 * * *"    # 19:58 EST
  workflow_dispatch:        # lets you run a manual test from the Actions tab

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Send reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TABLE_NAME: "Call Now, Cry Later"
        run: |
          # Manual runs (workflow_dispatch) send both immediately, for testing.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOW=$(TZ=America/New_York date +%H:%M)
            python send_reminder.py --target "$NOW" --which first
            python send_reminder.py --target "$NOW" --which second
            exit 0
          fi
          # Scheduled runs: pick the reminder based on which cron fired.
          case "${{ github.event.schedule }}" in
            "51 23 * * *"|"51 0 * * *")
              python send_reminder.py --target 19:58 --which first ;;
            "58 23 * * *"|"58 0 * * *")
              python send_reminder.py --target 20:05 --which second ;;
            *)
              echo "Unknown schedule: ${{ github.event.schedule }}" ;;
          esac
